<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tempo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      min-height: 100vh;
      background: linear-gradient(160deg, var(--g1,#0c4a6e), var(--g2,#0ea5e9), var(--g3,#7dd3fc));
      transition: background 1.4s ease;
    }

    /* ── sky themes ─── */
    .sky-clear   { --g1:#0c4a6e; --g2:#0ea5e9; --g3:#7dd3fc; }
    .sky-pcloudy { --g1:#1e4976; --g2:#2563a0; --g3:#4a90c4; }
    .sky-cloudy  { --g1:#1e293b; --g2:#334155; --g3:#475569; }
    .sky-fog     { --g1:#2d3748; --g2:#4b5563; --g3:#6b7280; }
    .sky-rain    { --g1:#0f2744; --g2:#1e3a8a; --g3:#1d4ed8; }
    .sky-storm   { --g1:#0a0f1e; --g2:#111827; --g3:#1f2937; }
    .sky-snow    { --g1:#cbd5e1; --g2:#e2e8f0; --g3:#f8fafc; --text:#0f172a; }
    .sky-night   { --g1:#020617; --g2:#0f172a; --g3:#1e293b; }
    .sky-snow *  { color: var(--text, #fff) !important; }
    .sky-snow .source { color: rgba(15,23,42,.45) !important; }

    /* ── layout ─── */
    #app {
      max-width: 460px;
      margin: 0 auto;
      padding: 1.75rem 1.4rem 2rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── loading / error ─── */
    #loading, #err {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      text-align: center;
    }
    .spinner {
      width: 1.75rem; height: 1.75rem;
      border: 2px solid rgba(255,255,255,.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p, #err p { font-size: .9rem; opacity: .7; }
    .ghost-btn {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.25);
      color: #fff; cursor: pointer;
      padding: .45rem 1.4rem;
      border-radius: 2rem;
      font-size: .875rem;
      font-family: inherit;
      transition: background .2s;
    }
    .ghost-btn:hover { background: rgba(255,255,255,.22); }

    /* ── weather panel ─── */
    #wx { flex: 1; display: flex; flex-direction: column; }

    /* header */
    .hdr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .loc {
      display: flex; align-items: center; gap: .45rem;
      font-size: .95rem; font-weight: 500; opacity: .9;
    }
    .dot { width: 5px; height: 5px; background: rgba(255,255,255,.65); border-radius: 50%; flex-shrink: 0; }
    .icon-btn {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
      color: #fff;
      width: 2.1rem; height: 2.1rem;
      border-radius: 50%; cursor: pointer;
      font-size: .85rem;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s; flex-shrink: 0;
    }
    .icon-btn:hover { background: rgba(255,255,255,.22); }

    /* hero */
    .hero {
      flex: 0 0 auto;
      display: flex; flex-direction: column;
      align-items: center;
      padding: .25rem 0 1.5rem;
      text-align: center;
    }
    .wx-icon {
      font-size: 4.25rem; line-height: 1;
      margin-bottom: .25rem;
      filter: drop-shadow(0 6px 14px rgba(0,0,0,.25));
    }
    .temp {
      font-size: 6rem; font-weight: 200; line-height: 1;
      letter-spacing: -.04em; font-variant-numeric: tabular-nums;
    }
    .temp sup { font-size: 2.2rem; font-weight: 300; vertical-align: super; opacity: .6; }
    .cond { font-size: 1rem; font-weight: 400; opacity: .8; margin: .35rem 0 .25rem; }
    .range { font-size: .82rem; opacity: .55; font-variant-numeric: tabular-nums; }

    /* glass card */
    .card {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 1rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* detail grids */
    .details-primary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      padding: .85rem .25rem;
      margin-bottom: .5rem;
    }
    .details-secondary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      padding: .7rem .25rem;
      margin-bottom: .75rem;
    }
    .dl {
      text-align: center; padding: 0 .2rem;
      border-right: 1px solid rgba(255,255,255,.1);
    }
    .dl:last-child { border-right: none; }
    .dl-label { font-size: .58rem; text-transform: uppercase; letter-spacing: .1em; opacity: .55; margin-bottom: .18rem; }
    .dl-val { font-size: .88rem; font-weight: 500; font-variant-numeric: tabular-nums; }
    .details-secondary .dl-label { font-size: .56rem; }
    .details-secondary .dl-val { font-size: .82rem; }

    /* astro + aqi row */
    .astro-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
      font-size: .8rem;
    }
    .astro-item { display: flex; align-items: center; gap: .3rem; opacity: .75; }
    .aqi-pill {
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 2rem;
      padding: .2rem .7rem;
      font-size: .7rem;
      font-weight: 500;
      letter-spacing: .03em;
    }
    .aqi-pill.aqi-good  { background: rgba(74,222,128,.2); border-color: rgba(74,222,128,.4); }
    .aqi-pill.aqi-mod   { background: rgba(251,191,36,.2);  border-color: rgba(251,191,36,.4); }
    .aqi-pill.aqi-bad   { background: rgba(239,68,68,.2);   border-color: rgba(239,68,68,.4); }

    /* section labels */
    .sec-label {
      font-size: .58rem; text-transform: uppercase;
      letter-spacing: .12em; opacity: .45;
      margin-bottom: .5rem;
    }

    /* hourly strip */
    .hourly-wrap {
      overflow-x: auto; scrollbar-width: none;
      margin-bottom: 1.25rem;
    }
    .hourly-wrap::-webkit-scrollbar { display: none; }
    .hourly {
      display: flex; gap: .3rem;
      width: max-content;
    }
    .hour {
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.11);
      border-radius: .75rem;
      width: 52px;
      padding: .5rem .15rem;
      text-align: center;
      flex-shrink: 0;
    }
    .hour.now {
      background: rgba(255,255,255,.18);
      border-color: rgba(255,255,255,.28);
    }
    .hour-time { font-size: .6rem; opacity: .6; letter-spacing: .05em; margin-bottom: .25rem; }
    .hour-icon { font-size: 1.25rem; line-height: 1; margin-bottom: .25rem; }
    .hour-temp { font-size: .78rem; font-weight: 500; font-variant-numeric: tabular-nums; margin-bottom: .15rem; }
    .hour-rain { font-size: .64rem; color: #93c5fd; min-height: .85rem; }

    /* daily */
    .fc {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: .3rem;
      overflow-x: auto; scrollbar-width: none;
      margin-bottom: 1rem;
    }
    .fc::-webkit-scrollbar { display: none; }
    .day {
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.11);
      border-radius: .75rem;
      padding: .55rem .1rem;
      text-align: center;
      min-width: 50px;
    }
    .day.today { background: rgba(255,255,255,.17); border-color: rgba(255,255,255,.28); }
    .day-name { font-size: .58rem; text-transform: uppercase; letter-spacing: .07em; opacity: .6; margin-bottom: .28rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .day-icon { font-size: 1.3rem; line-height: 1; margin-bottom: .25rem; }
    .day-temps { font-size: .7rem; font-variant-numeric: tabular-nums; }
    .day-max { font-weight: 600; }
    .day-min { opacity: .5; }
    .day-pop { font-size: .62rem; color: #93c5fd; margin-top: .15rem; min-height: .8rem; }

    /* footer */
    .footer { margin-top: auto; padding-top: 1rem; display: flex; justify-content: flex-end; }
    .source { font-size: .58rem; opacity: .35; text-transform: uppercase; letter-spacing: .1em; }

    /* ── search overlay ─── */
    #search {
      position: fixed; inset: 0;
      background: rgba(5,10,20,.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      z-index: 100;
      display: flex; flex-direction: column;
      padding: 1.5rem;
    }
    .sh { display: flex; align-items: center; gap: .75rem; margin-bottom: 1rem; }
    .back-btn {
      background: none; border: none;
      color: rgba(255,255,255,.65);
      font-size: 1rem; cursor: pointer; padding: .25rem;
      transition: color .2s; flex-shrink: 0;
    }
    .back-btn:hover { color: #fff; }
    #sinput {
      flex: 1;
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: .75rem;
      padding: .7rem 1rem;
      color: #fff; font-size: 1rem; outline: none;
      font-family: inherit;
      transition: border-color .2s, background .2s;
    }
    #sinput::placeholder { opacity: .45; }
    #sinput:focus { border-color: rgba(255,255,255,.5); background: rgba(255,255,255,.14); }
    #sresults { list-style: none; overflow-y: auto; flex: 1; }
    .sr {
      padding: .85rem 0;
      border-bottom: 1px solid rgba(255,255,255,.07);
      cursor: pointer;
      display: flex; flex-direction: column; gap: .1rem;
      transition: opacity .15s;
    }
    .sr:hover { opacity: .75; }
    .sr-city { font-size: .95rem; font-weight: 500; }
    .sr-region { font-size: .78rem; opacity: .45; }
    .sr-empty { padding: 2rem 0; text-align: center; opacity: .45; font-size: .875rem; }

    [hidden] { display: none !important; }

    @media (max-width: 380px) {
      .temp { font-size: 5.25rem; }
      .wx-icon { font-size: 3.5rem; }
      .details-primary { grid-template-columns: repeat(2, 1fr); }
      .details-primary .dl:nth-child(2) { border-right: none; }
      .details-primary .dl:nth-child(3) { border-right: 1px solid rgba(255,255,255,.1); }
      .details-secondary { grid-template-columns: repeat(2, 1fr); }
      .details-secondary .dl:nth-child(2) { border-right: none; }
      .details-secondary .dl:nth-child(3) { border-right: 1px solid rgba(255,255,255,.1); }
    }
  </style>
</head>
<body class="sky-clear">
<div id="app">

  <div id="loading">
    <div class="spinner"></div>
    <p>Localizando…</p>
  </div>

  <div id="err" hidden>
    <p id="err-msg">Não foi possível obter o clima.</p>
    <button class="ghost-btn" onclick="init()">Tentar novamente</button>
    <button class="ghost-btn" onclick="openSearch()">Buscar cidade</button>
  </div>

  <div id="wx" hidden>
    <div class="hdr">
      <div class="loc">
        <span class="dot"></span>
        <span id="city"></span>
      </div>
      <button class="icon-btn" onclick="openSearch()" title="Buscar cidade">🔍</button>
    </div>

    <div class="hero">
      <div class="wx-icon" id="icon">⛅</div>
      <div class="temp" id="temp">–<sup>°</sup></div>
      <div class="cond" id="cond"></div>
      <div class="range" id="range"></div>
    </div>

    <div class="details-primary card">
      <div class="dl"><div class="dl-label">Sensação</div><div class="dl-val" id="d-feels">–</div></div>
      <div class="dl"><div class="dl-label">Umidade</div><div class="dl-val" id="d-hum">–</div></div>
      <div class="dl"><div class="dl-label">Vento</div><div class="dl-val" id="d-wind">–</div></div>
      <div class="dl"><div class="dl-label">Chuva</div><div class="dl-val" id="d-rain">–</div></div>
    </div>

    <div class="details-secondary card">
      <div class="dl"><div class="dl-label">Índice UV</div><div class="dl-val" id="d-uv">–</div></div>
      <div class="dl"><div class="dl-label">Visib.</div><div class="dl-val" id="d-vis">–</div></div>
      <div class="dl"><div class="dl-label">Pressão</div><div class="dl-val" id="d-pres">–</div></div>
      <div class="dl"><div class="dl-label">Orvalho</div><div class="dl-val" id="d-dew">–</div></div>
    </div>

    <div class="astro-row">
      <div class="astro-item" id="astro-sunrise"></div>
      <div id="aqi-pill"></div>
      <div class="astro-item" id="astro-sunset"></div>
    </div>

    <div class="sec-label">Próximas horas</div>
    <div class="hourly-wrap">
      <div class="hourly" id="hourly"></div>
    </div>

    <div class="sec-label">Próximos 7 dias</div>
    <div class="fc" id="fc"></div>

    <div class="footer">
      <span class="source" id="src"></span>
    </div>
  </div>

</div>

<div id="search" hidden>
  <div class="sh">
    <button class="back-btn" onclick="closeSearch()">← Voltar</button>
    <input id="sinput" type="text" placeholder="Buscar cidade…"
           autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <ul id="sresults"></ul>
</div>

<script>
  const FALLBACK = { lat: -18.9186, lon: -48.2772 };

  const EMOJI = {
    0:'☀️',1:'🌤️',2:'⛅',3:'☁️',
    45:'🌫️',48:'🌫️',
    51:'🌦️',53:'🌦️',55:'🌧️',
    61:'🌧️',63:'🌧️',65:'🌧️',
    71:'❄️',73:'❄️',75:'❄️',77:'🌨️',
    80:'🌦️',81:'🌦️',82:'🌧️',
    85:'🌨️',86:'❄️',
    95:'⛈️',96:'⛈️',99:'⛈️',
  };

  const WMO_PT = {
    0:'Céu limpo',1:'Predominantemente limpo',2:'Parcialmente nublado',3:'Nublado',
    45:'Nevoeiro',48:'Nevoeiro com geada',
    51:'Garoa leve',53:'Garoa',55:'Garoa intensa',
    61:'Chuva leve',63:'Chuva moderada',65:'Chuva forte',
    71:'Neve leve',73:'Neve',75:'Neve forte',77:'Granizo',
    80:'Pancadas leves',81:'Pancadas de chuva',82:'Pancadas fortes',
    95:'Trovoada',96:'Trovoada com granizo',99:'Trovoada severa',
  };

  const DAYS_PT = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

  function wxEmoji(code, isDay = true) {
    if (code === 0 && !isDay) return '🌙';
    return EMOJI[code] ?? (code <= 3 ? '⛅' : code <= 48 ? '🌫️' : code <= 67 ? '🌧️' : code <= 77 ? '❄️' : '⛈️');
  }

  function skyClass(code, isDay = true) {
    if (!isDay) return 'sky-night';
    if (code >= 95) return 'sky-storm';
    if ([61,63,65,80,81,82,55].includes(code)) return 'sky-rain';
    if ([45,48].includes(code)) return 'sky-fog';
    if (code >= 71 && code <= 77) return 'sky-snow';
    if (code === 3) return 'sky-cloudy';
    if (code === 2) return 'sky-pcloudy';
    return 'sky-clear';
  }

  function aqiClass(label) {
    if (!label) return '';
    if (['Ótima','Boa'].includes(label)) return 'aqi-good';
    if (label === 'Moderada') return 'aqi-mod';
    return 'aqi-bad';
  }

  function dayLabel(isoDate, idx) {
    if (idx === 0) return 'Hoje';
    if (idx === 1) return 'Amanhã';
    try { return DAYS_PT[new Date(isoDate + 'T12:00:00').getDay()]; }
    catch (_) { return DAYS_PT[idx % 7]; }
  }

  function getAqiLabel(v) {
    if (v === null) return null;
    const tiers = [[0,'Ótima'],[20,'Boa'],[40,'Moderada'],[60,'Ruim'],[80,'Muito Ruim'],[100,'Extremamente Ruim']];
    return [...tiers].reverse().find(([t]) => v >= t)?.[1] ?? 'Ótima';
  }

  function bearingDir(deg) {
    if (deg == null) return '';
    const dirs = ['N','NE','L','SE','S','SO','O','NO'];
    return dirs[Math.round(deg / 45) % 8];
  }

  function $id(id) { return document.getElementById(id); }
  function show(id) { $id(id).hidden = false; }
  function hide(id) { $id(id).hidden = true; }

  // ── render ─────────────────────────────────────
  function render(data) {
    const c = data.current || {};
    const t = data.today || {};
    const daily = data.daily || [];
    const hourly = data.hourly || [];

    document.body.className = skyClass(c.code || 0, c.is_day !== false);

    $id('city').textContent = data.city || '–';
    $id('icon').textContent = wxEmoji(c.code || 0, c.is_day !== false);
    $id('temp').innerHTML = `${c.temp != null ? c.temp : '–'}<sup>°</sup>`;
    $id('cond').textContent = c.condition || '';
    if (daily[0]?.max != null && daily[0]?.min != null) {
      $id('range').textContent = `Máx ${daily[0].max}°  ·  Mín ${daily[0].min}°`;
    }

    // Primary details
    $id('d-feels').textContent = c.feels_like != null ? `${c.feels_like}°` : (c.temp != null ? `${c.temp}°` : '–');
    $id('d-hum').textContent   = c.humidity != null ? `${c.humidity}%` : '–';
    const windTxt = c.wind_kph != null
      ? `${c.wind_kph}${c.wind_dir ? ' ' + c.wind_dir : ''} km/h`
      : '–';
    $id('d-wind').textContent  = windTxt;
    $id('d-rain').textContent  = daily[0]?.precip_prob != null ? `${daily[0].precip_prob}%` : '–';

    // Secondary details
    const uvStr = c.uv_index != null ? String(c.uv_index) + (uvLabel(c.uv_index) ? ' · ' + uvLabel(c.uv_index) : '') : '–';
    $id('d-uv').textContent   = c.uv_index != null ? c.uv_index : '–';
    $id('d-vis').textContent  = c.visibility_km != null ? `${c.visibility_km} km` : '–';
    $id('d-pres').textContent = c.pressure_mb != null ? `${c.pressure_mb} hPa` : '–';
    $id('d-dew').textContent  = c.dew_point != null ? `${c.dew_point}°` : '–';

    // Sunrise / sunset
    const srEl = $id('astro-sunrise');
    const ssEl = $id('astro-sunset');
    srEl.innerHTML = t.sunrise ? `<span>☀️</span><span>${t.sunrise}</span>` : '';
    ssEl.innerHTML = t.sunset  ? `<span>${t.sunset}</span><span>🌇</span>` : '';

    // AQI pill
    const aqEl = $id('aqi-pill');
    if (t.aqi_label) {
      const cls = aqiClass(t.aqi_label);
      aqEl.innerHTML = `<span class="aqi-pill ${cls}">Ar: ${t.aqi_label}</span>`;
    } else {
      aqEl.innerHTML = '';
    }

    // Hourly
    const hourlyEl = $id('hourly');
    hourlyEl.innerHTML = '';
    hourly.forEach((h, i) => {
      const el = document.createElement('div');
      el.className = 'hour' + (i === 0 ? ' now' : '');
      const rainHtml = h.precip_prob >= 20
        ? `<div class="hour-rain">${h.precip_prob}%</div>`
        : `<div class="hour-rain"></div>`;
      el.innerHTML = `
        <div class="hour-time">${h.time}</div>
        <div class="hour-icon">${wxEmoji(h.code || 0)}</div>
        <div class="hour-temp">${h.temp != null ? h.temp + '°' : '–'}</div>
        ${rainHtml}`;
      hourlyEl.appendChild(el);
    });

    // Daily
    const fcEl = $id('fc');
    fcEl.innerHTML = '';
    daily.forEach((d, i) => {
      const el = document.createElement('div');
      el.className = 'day' + (i === 0 ? ' today' : '');
      const pop = d.precip_prob > 0 ? `<div class="day-pop">${d.precip_prob}%</div>` : `<div class="day-pop"></div>`;
      el.innerHTML = `
        <div class="day-name">${d.day || '–'}</div>
        <div class="day-icon">${wxEmoji(d.code || 0)}</div>
        <div class="day-temps">
          <span class="day-max">${d.max != null ? d.max : '–'}°</span>
          <span class="day-min"> / ${d.min != null ? d.min : '–'}°</span>
        </div>
        ${pop}`;
      fcEl.appendChild(el);
    });

    // Source badge
    const srcMap = {
      'inmet': '· INMET',
      'cptec+open-meteo': '· CPTEC/INPE + Open-Meteo',
      'open-meteo': '· Open-Meteo',
    };
    $id('src').textContent = srcMap[data.source] || `· ${data.source || ''}`;

    hide('loading'); hide('err'); show('wx');
  }

  function uvLabel(v) {
    if (v == null) return '';
    if (v >= 11) return 'Extremo';
    if (v >= 8)  return 'Muito Alto';
    if (v >= 6)  return 'Alto';
    if (v >= 3)  return 'Moderado';
    return 'Baixo';
  }

  // ── browser-side Open-Meteo fallback ────────────
  async function fetchOpenMeteo(lat, lon) {
    const qs = new URLSearchParams({
      latitude: lat.toFixed(4), longitude: lon.toFixed(4),
      hourly: 'temperature_2m,relativehumidity_2m,apparent_temperature,precipitation_probability,weathercode,surface_pressure,visibility,uv_index,dewpoint_2m,windspeed_10m,winddirection_10m,windgusts_10m',
      daily: 'weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,uv_index_max,sunrise,sunset',
      current_weather: 'true',
      timezone: 'America/Sao_Paulo',
      forecast_days: '7',
    });
    const qs2 = new URLSearchParams({
      latitude: lat.toFixed(4), longitude: lon.toFixed(4),
      hourly: 'pm2_5,european_aqi',
      timezone: 'America/Sao_Paulo',
      forecast_days: '1',
    });

    const [wxRes, cityRes, aqRes] = await Promise.all([
      fetch(`https://api.open-meteo.com/v1/forecast?${qs}`),
      fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=pt`),
      fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?${qs2}`).catch(() => null),
    ]);

    const wx = await wxRes.json();
    const cd = await cityRes.json();
    const aq = aqRes ? await aqRes.json().catch(() => null) : null;

    // City name
    const city = cd.city || cd.locality || '';
    const stCode = (cd.principalSubdivisionCode || '').replace(/^BR-/, '');
    const cityName = city && stCode ? `${city}, ${stCode}` : city || 'Uberlândia, MG';

    const cw = wx.current_weather || {};
    const daily = wx.daily || {};
    const hourly = wx.hourly || {};
    const code = cw.weathercode ?? 0;

    // Find current hour index
    const cwTime = (cw.time || '').slice(0, 13);
    const hTimes = hourly.time || [];
    let hi = hTimes.findIndex(t => t.slice(0, 13) >= cwTime);
    if (hi < 0) hi = 0;

    const h = key => (hourly[key] || [])[hi] ?? null;

    // AQ
    let aqiVal = null, pm25 = null, aqiLabel = null;
    if (aq) {
      const aqH = aq.hourly || {};
      const aqTimes = aqH.time || [];
      let aqHi = aqTimes.findIndex(t => t.slice(0, 13) >= cwTime);
      if (aqHi < 0) aqHi = 0;
      aqiVal = (aqH.european_aqi || [])[aqHi] ?? null;
      pm25 = (aqH.pm2_5 || [])[aqHi] ?? null;
      if (aqiVal != null) aqiLabel = getAqiLabel(Math.round(aqiVal));
    }

    // Sunrise/sunset
    const sunrises = daily.sunrise || [];
    const sunsets = daily.sunset || [];
    const sunrise = sunrises[0] ? sunrises[0].slice(11, 16) : null;
    const sunset = sunsets[0] ? sunsets[0].slice(11, 16) : null;
    const uvMaxArr = daily.uv_index_max || [];
    const uvMax = uvMaxArr[0] != null ? Math.round(uvMaxArr[0] * 10) / 10 : null;

    // Hourly (next 24h)
    const hCode = hourly.weathercode || [];
    const hTemp = hourly.temperature_2m || [];
    const hPop = hourly.precipitation_probability || [];
    const hourlyOut = [];
    for (let j = hi; j < Math.min(hi + 24, hTimes.length); j++) {
      hourlyOut.push({
        time: hTimes[j].slice(11, 16),
        code: hCode[j] ?? 0,
        temp: hTemp[j] != null ? Math.round(hTemp[j]) : null,
        precip_prob: hPop[j] ?? 0,
      });
    }

    // Daily
    const dTimes = daily.time || [];
    const dCode = daily.weathercode || [];
    const dMax = daily.temperature_2m_max || [];
    const dMin = daily.temperature_2m_min || [];
    const dPrecip = daily.precipitation_sum || [];
    const dPop = daily.precipitation_probability_max || [];
    const dUv = daily.uv_index_max || [];

    const dailyOut = dTimes.slice(0, 7).map((dt, i) => ({
      day: dayLabel(dt, i),
      code: dCode[i] ?? 0,
      condition: WMO_PT[dCode[i]] || '',
      max: dMax[i] != null ? Math.round(dMax[i]) : null,
      min: dMin[i] != null ? Math.round(dMin[i]) : null,
      precip_mm: dPrecip[i] ?? 0,
      precip_prob: dPop[i] ?? 0,
      uv_max: dUv[i] != null ? Math.round(dUv[i] * 10) / 10 : null,
    }));

    const visM = h('visibility');
    return {
      city: cityName,
      source: 'open-meteo',
      current: {
        temp: cw.temperature != null ? Math.round(cw.temperature) : null,
        feels_like: h('apparent_temperature') != null ? Math.round(h('apparent_temperature')) : null,
        humidity: h('relativehumidity_2m'),
        wind_kph: cw.windspeed != null ? Math.round(cw.windspeed) : null,
        wind_dir: bearingDir(cw.winddirection),
        wind_gust_kph: h('windgusts_10m') != null ? Math.round(h('windgusts_10m')) : null,
        condition: WMO_PT[code] || '',
        code,
        visibility_km: visM != null ? Math.round(visM / 100) / 10 : null,
        pressure_mb: h('surface_pressure') != null ? Math.round(h('surface_pressure')) : null,
        dew_point: h('dewpoint_2m') != null ? Math.round(h('dewpoint_2m')) : null,
        uv_index: h('uv_index') != null ? Math.round(h('uv_index') * 10) / 10 : null,
        is_day: !!cw.is_day,
      },
      today: { sunrise, sunset, uv_max: uvMax, aqi: aqiVal != null ? Math.round(aqiVal) : null, aqi_label: aqiLabel, pm25 },
      hourly: hourlyOut,
      daily: dailyOut,
    };
  }

  // ── load ────────────────────────────────────────
  async function load(lat, lon) {
    show('loading'); hide('wx'); hide('err');

    let data = null;

    // Try backend (CPTEC + Open-Meteo via Netlify Function)
    try {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 9000);
      const r = await fetch(`/api/weather?lat=${lat}&lon=${lon}`, { signal: ctrl.signal });
      clearTimeout(tid);
      if (r.ok) {
        const j = await r.json();
        if (!j.error) data = j;
      }
    } catch (_) {}

    // Browser fallback: Open-Meteo directly
    if (!data) {
      try { data = await fetchOpenMeteo(lat, lon); }
      catch (e) { console.error('fallback failed:', e); }
    }

    if (!data) {
      $id('err-msg').textContent = 'Não foi possível obter o clima. Verifique sua conexão.';
      hide('loading'); show('err');
      return;
    }
    render(data);
  }

  function init() {
    if (!navigator.geolocation) { load(FALLBACK.lat, FALLBACK.lon); return; }
    show('loading');
    navigator.geolocation.getCurrentPosition(
      p => load(p.coords.latitude, p.coords.longitude),
      () => load(FALLBACK.lat, FALLBACK.lon),
      { timeout: 8000, maximumAge: 300000 }
    );
  }

  // ── search ───────────────────────────────────────
  function openSearch()  { show('search'); $id('sinput').focus(); }
  function closeSearch() {
    hide('search');
    $id('sinput').value = '';
    $id('sresults').innerHTML = '';
  }

  let searchTimer;
  $id('sinput').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => doSearch(e.target.value.trim()), 280);
  });

  async function doSearch(q) {
    const ul = $id('sresults');
    if (!q || q.length < 2) { ul.innerHTML = ''; return; }
    try {
      const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&language=pt&count=8`);
      paintResults((await r.json()).results || []);
    } catch (_) {
      ul.innerHTML = '<li class="sr-empty">Erro na busca.</li>';
    }
  }

  function paintResults(results) {
    const ul = $id('sresults');
    if (!results.length) { ul.innerHTML = '<li class="sr-empty">Nenhuma cidade encontrada</li>'; return; }
    ul.innerHTML = '';
    results.forEach(r => {
      const li = document.createElement('li');
      li.className = 'sr';
      const region = [r.admin1, r.country].filter(Boolean).join(', ');
      li.innerHTML = `<span class="sr-city">${r.name}</span><span class="sr-region">${region}</span>`;
      li.onclick = () => { closeSearch(); load(r.latitude, r.longitude); };
      ul.appendChild(li);
    });
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSearch(); });

  init();
</script>
