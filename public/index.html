<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tempo</title>
  <link rel="preconnect" href="https://api.open-meteo.com">
  <link rel="preconnect" href="https://air-quality-api.open-meteo.com">
  <link rel="preconnect" href="https://geocoding-api.open-meteo.com">
  <link rel="preconnect" href="https://api.bigdatacloud.net">
  <meta name="theme-color" id="theme-color" content="#0c4a6e">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      min-height: 100vh;
      background: linear-gradient(160deg, var(--g1,#0c4a6e), var(--g2,#0ea5e9), var(--g3,#7dd3fc));
      transition: background 1.4s ease;
    }

    /* ── sky themes ─── */
    .sky-clear   { --g1:#0c4a6e; --g2:#0ea5e9; --g3:#7dd3fc; }
    .sky-pcloudy { --g1:#1e4976; --g2:#2563a0; --g3:#4a90c4; }
    .sky-cloudy  { --g1:#1e293b; --g2:#334155; --g3:#475569; }
    .sky-fog     { --g1:#2d3748; --g2:#4b5563; --g3:#6b7280; }
    .sky-rain    { --g1:#0f2744; --g2:#1e3a8a; --g3:#1d4ed8; }
    .sky-storm   { --g1:#0a0f1e; --g2:#111827; --g3:#1f2937; }
    .sky-snow    { --g1:#cbd5e1; --g2:#e2e8f0; --g3:#f8fafc; --text:#0f172a; }
    .sky-night   { --g1:#020617; --g2:#0f172a; --g3:#1e293b; }
    .sky-snow *  { color: var(--text,#fff) !important; }
    .sky-snow .source { color: rgba(15,23,42,.45) !important; }

    /* ── reduced motion ─── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }

    /* ── accessibility ─── */
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
    :focus-visible {
      outline: 2px solid rgba(255,255,255,.75);
      outline-offset: 3px;
      border-radius: .35rem;
    }

    /* ── app shell ─── */
    #app {
      max-width: 480px;
      margin: 0 auto;
      padding: 1.75rem 1.25rem 2rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── loading (skeleton) ─── */
    #loading {
      flex: 1; display: flex; flex-direction: column;
    }

    /* skeleton shimmer */
    @keyframes sk-pulse { 0%,100% { opacity: 1 } 50% { opacity: .28 } }
    .sk {
      background: rgba(255,255,255,.12);
      animation: sk-pulse 1.6s ease-in-out infinite;
    }
    .sk-layout { flex: 1; display: flex; flex-direction: column; }
    .sk-hdr-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.25rem;
    }
    .sk-loc  { height: .9rem; width: 44%; border-radius: .4rem; }
    .sk-btn  { width: 2.75rem; height: 2.75rem; border-radius: 50%; flex-shrink: 0; }
    .sk-hero-sec {
      display: flex; flex-direction: column; align-items: center;
      padding: .25rem 0 1.25rem; gap: .55rem;
    }
    .sk-wx-icon { width: 4rem; height: 4rem; border-radius: 1rem; }
    .sk-temp    { width: 52%; height: 5rem; border-radius: .5rem; }
    .sk-cond    { width: 62%; height: .9rem; border-radius: .35rem; }
    .sk-range   { width: 40%; height: .75rem; border-radius: .35rem; opacity: .6; }
    .sk-card    { border-radius: 1rem; border: 1px solid rgba(255,255,255,.08); }
    .sk-primary   { height: 3.7rem; margin-bottom: .5rem; }
    .sk-secondary { height: 3.2rem; margin-bottom: .5rem; }
    .sk-astro     { height: 2.5rem; margin-bottom: 1.25rem; }
    .sk-lbl  { height: .56rem; width: 26%; border-radius: .2rem; opacity: .45; margin-bottom: .45rem; }
    .sk-lbl-mt { margin-top: 1.25rem; }
    .sk-hr-row { display: flex; gap: .3rem; overflow: hidden; margin-bottom: 1.25rem; }
    .sk-hr { width: 52px; height: 82px; border-radius: .7rem; flex-shrink: 0; }
    .sk-fc-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: .3rem; }
    .sk-dc { border-radius: .7rem; height: 88px; }

    /* ── error ─── */
    #err {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1rem; text-align: center;
    }
    #err p { font-size: .9rem; opacity: .7; }
    .ghost-btn {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.25);
      color: #fff; cursor: pointer;
      padding: .55rem 1.5rem;
      border-radius: 2rem;
      font-size: .875rem; font-family: inherit;
      transition: background .2s, transform .1s;
      min-height: 44px;
    }
    .ghost-btn:hover  { background: rgba(255,255,255,.22); }
    .ghost-btn:active { transform: scale(.96); opacity: .85; }

    /* ── weather panel ─── */
    #wx { flex: 1; display: flex; flex-direction: column; }

    /* header */
    .hdr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }
    .loc {
      display: flex; align-items: center; gap: .45rem;
      font-size: .9rem; font-weight: 500; opacity: .9;
    }
    .dot { width: 5px; height: 5px; background: rgba(255,255,255,.65); border-radius: 50%; flex-shrink: 0; }
    .icon-btn {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
      color: #fff;
      width: 2.75rem; height: 2.75rem;
      border-radius: 50%; cursor: pointer;
      font-size: .9rem;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .12s; flex-shrink: 0;
    }
    .icon-btn:hover  { background: rgba(255,255,255,.22); }
    .icon-btn:active { transform: scale(.88); }

    /* ── top grid: hero + right column ─── */
    .top-grid {
      display: flex; flex-direction: column;
      margin-bottom: 1.25rem;
    }

    /* hero — mobile: centered */
    .hero {
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      padding: .25rem 0 1.25rem;
    }
    .wx-icon {
      font-size: 4rem; line-height: 1;
      margin-bottom: .2rem;
      filter: drop-shadow(0 6px 14px rgba(0,0,0,.22));
      transition: opacity .3s;
    }
    .temp {
      font-size: 5.75rem; font-weight: 200; line-height: 1;
      letter-spacing: -.04em; font-variant-numeric: tabular-nums;
    }
    .temp sup { font-size: 2rem; font-weight: 300; vertical-align: super; opacity: .6; }
    .cond { font-size: .95rem; opacity: .8; margin: .3rem 0 .2rem; }
    .range { font-size: .8rem; opacity: .5; font-variant-numeric: tabular-nums; }

    /* right column: stacks detail cards */
    .right-col { display: flex; flex-direction: column; gap: .5rem; }

    /* glass card */
    .card {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 1rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* detail grids */
    .details-primary {
      display: grid; grid-template-columns: repeat(4, 1fr);
      padding: .8rem .2rem;
    }
    .details-secondary {
      display: grid; grid-template-columns: repeat(4, 1fr);
      padding: .65rem .2rem;
    }
    .dl {
      text-align: center; padding: 0 .15rem;
      border-right: 1px solid rgba(255,255,255,.1);
    }
    .dl:last-child { border-right: none; }
    .dl-label {
      font-size: .56rem; text-transform: uppercase;
      letter-spacing: .1em; opacity: .5; margin-bottom: .15rem;
    }
    .dl-val { font-size: .85rem; font-weight: 500; font-variant-numeric: tabular-nums; }
    .details-secondary .dl-val { font-size: .8rem; }

    /* astro + aqi */
    .astro-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: .78rem; padding: .5rem .6rem;
    }
    .astro-item { display: flex; align-items: center; gap: .3rem; opacity: .75; }
    .aqi-pill {
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 2rem; padding: .18rem .65rem;
      font-size: .68rem; font-weight: 500; letter-spacing: .03em;
    }
    .aqi-pill.aqi-good { background: rgba(74,222,128,.2);  border-color: rgba(74,222,128,.4); }
    .aqi-pill.aqi-mod  { background: rgba(251,191,36,.2);  border-color: rgba(251,191,36,.4); }
    .aqi-pill.aqi-bad  { background: rgba(239,68,68,.2);   border-color: rgba(239,68,68,.4); }

    /* section labels */
    .sec-label {
      font-size: .56rem; text-transform: uppercase;
      letter-spacing: .12em; opacity: .45; margin-bottom: .45rem;
    }

    /* hourly strip */
    .hourly-wrap { overflow-x: auto; scrollbar-width: none; margin-bottom: 1.25rem; }
    .hourly-wrap::-webkit-scrollbar { display: none; }
    .hourly { display: flex; gap: .3rem; width: max-content; }
    .hour {
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.11);
      border-radius: .7rem; width: 52px;
      padding: .5rem .1rem; text-align: center; flex-shrink: 0;
      transition: background .15s, transform .1s;
    }
    .hour.now { background: rgba(255,255,255,.18); border-color: rgba(255,255,255,.28); }
    .hour:active { transform: scale(.95); opacity: .8; }
    .hour-time  { font-size: .58rem; opacity: .6; letter-spacing: .04em; margin-bottom: .22rem; }
    .hour-icon  { font-size: 1.2rem; line-height: 1; margin-bottom: .22rem; }
    .hour-temp  { font-size: .76rem; font-weight: 500; font-variant-numeric: tabular-nums; margin-bottom: .12rem; }
    .hour-rain  { font-size: .62rem; color: #93c5fd; min-height: .8rem; }

    /* daily */
    .fc {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: .3rem; overflow-x: auto; scrollbar-width: none;
      margin-bottom: 1rem;
    }
    .fc::-webkit-scrollbar { display: none; }
    .day {
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.11);
      border-radius: .7rem; padding: .5rem .1rem;
      text-align: center; min-width: 48px; min-height: 88px;
      cursor: pointer; transition: background .15s, border-color .15s, transform .1s;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .day:hover    { background: rgba(255,255,255,.14); }
    .day:active   { transform: scale(.95); opacity: .8; }
    .day.today    { background: rgba(255,255,255,.17); border-color: rgba(255,255,255,.28); }
    .day.selected { background: rgba(255,255,255,.22); border-color: rgba(255,255,255,.45); }
    .day-name  { font-size: .56rem; text-transform: uppercase; letter-spacing: .06em; opacity: .6; margin-bottom: .25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .day-icon  { font-size: 1.25rem; line-height: 1; margin-bottom: .22rem; }
    .day-temps { font-size: .68rem; font-variant-numeric: tabular-nums; }
    .day-max   { font-weight: 600; }
    .day-min   { opacity: .5; }
    .day-pop   { font-size: .6rem; color: #93c5fd; margin-top: .12rem; min-height: .75rem; }

    /* ── day detail panel ─── */
    #day-detail {
      background: rgba(255,255,255,.11);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 1rem;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      padding: 1rem;
      margin-bottom: 1rem;
      animation: fadeSlide .18s ease;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .dd-hdr {
      display: flex; align-items: center; gap: .65rem;
      margin-bottom: .85rem;
    }
    .dd-icon  { font-size: 2.2rem; line-height: 1; flex-shrink: 0; }
    .dd-meta  { flex: 1; min-width: 0; }
    .dd-title { font-size: 1rem; font-weight: 500; }
    .dd-cond  { font-size: .76rem; opacity: .6; margin-top: .05rem; }
    .dd-temp  {
      font-size: 1.5rem; font-weight: 200;
      font-variant-numeric: tabular-nums; white-space: nowrap;
    }
    .dd-temp-min { opacity: .45; }
    .dd-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: .4rem .2rem;
    }
    .dd-cell { text-align: center; padding: .3rem .1rem; }
    .dd-cell-lbl {
      font-size: .54rem; text-transform: uppercase;
      letter-spacing: .1em; opacity: .48; margin-bottom: .12rem;
    }
    .dd-cell-val { font-size: .82rem; font-weight: 500; font-variant-numeric: tabular-nums; }

    /* footer */
    .footer { margin-top: auto; padding-top: 1rem; display: flex; align-items: center; justify-content: space-between; }
    .source { font-size: .56rem; opacity: .35; text-transform: uppercase; letter-spacing: .1em; }
    .rel-pill {
      font-size: .58rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
      padding: .22rem .65rem; border-radius: 999px; border: 1px solid transparent;
    }
    .rel-alta   { background: rgba(34,197,94,.18);  border-color: rgba(34,197,94,.4);  color: #86efac; }
    .rel-boa    { background: rgba(56,189,248,.15); border-color: rgba(56,189,248,.4); color: #7dd3fc; }
    .rel-padrao { background: rgba(148,163,184,.12);border-color: rgba(148,163,184,.3);color: #94a3b8; }
    .thunder-pill {
      display: inline-flex; align-items: center; gap: .3rem;
      background: #3d2c00; color: #ffb300;
      padding: .2rem .6rem; border-radius: 999px;
      font-size: .72rem; font-weight: 600; letter-spacing: .02em;
    }

    /* ── radar map ─── */
    .section-hd {
      display: flex; align-items: center; justify-content: space-between;
      font-size: .6rem; font-weight: 700; letter-spacing: .12em;
      color: rgba(255,255,255,.4); text-transform: uppercase; margin: 1.4rem 0 .4rem;
    }
    .layer-btns { display: flex; gap: .3rem; }
    .layer-btn {
      font-size: .65rem; padding: .2rem .55rem; border-radius: 999px;
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15);
      color: rgba(255,255,255,.5); cursor: pointer; transition: background .15s;
    }
    .layer-btn.active {
      background: rgba(56,189,248,.25); border-color: rgba(56,189,248,.5); color: #7dd3fc;
    }
    #radar-map { height: 280px; border-radius: 12px; overflow: hidden; margin-top: .5rem; }
    @media (max-width: 480px) { #radar-map { height: 200px; } }

    /* ── search overlay ─── */
    #search-backdrop {
      position: fixed; inset: 0; z-index: 99;
      background: transparent;
    }
    #search {
      position: fixed; inset: 0;
      background: rgba(5,10,20,.92);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      z-index: 100;
      display: flex; flex-direction: column;
      padding: 1.5rem;
    }
    .sh { display: flex; align-items: center; gap: .75rem; margin-bottom: 1rem; }
    .back-btn {
      background: none; border: none;
      color: rgba(255,255,255,.6);
      font-size: 1.1rem; cursor: pointer;
      padding: .5rem; min-width: 44px; min-height: 44px;
      display: flex; align-items: center; justify-content: center;
      transition: color .2s, transform .12s; flex-shrink: 0;
      border-radius: .5rem;
    }
    .back-btn:hover  { color: #fff; }
    .back-btn:active { transform: scale(.88); }
    #sinput {
      flex: 1;
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: .75rem;
      padding: .7rem 1rem;
      color: #fff; font-size: 1rem; outline: none; font-family: inherit;
      transition: border-color .2s, background .2s;
    }
    #sinput::placeholder { opacity: .4; }
    #sinput:focus { border-color: rgba(255,255,255,.55); background: rgba(255,255,255,.14); }
    #sresults { list-style: none; overflow-y: auto; flex: 1; }
    .sr {
      padding: .9rem 0;
      border-bottom: 1px solid rgba(255,255,255,.07);
      cursor: pointer; display: flex; flex-direction: column; gap: .1rem;
      transition: opacity .15s;
      min-height: 56px; justify-content: center;
    }
    .sr:hover  { opacity: .72; }
    .sr:active { opacity: .5; }
    .sr-city   { font-size: .95rem; font-weight: 500; }
    .sr-region { font-size: .78rem; opacity: .45; }
    .sr-empty  { padding: 2rem 0; text-align: center; opacity: .45; font-size: .875rem; }

    [hidden] { display: none !important; }

    /* ── small mobile (< 380px) ─── */
    @media (max-width: 379px) {
      .temp { font-size: 4.75rem; }
      .wx-icon { font-size: 3.25rem; }
      .details-primary, .details-secondary {
        grid-template-columns: repeat(2, 1fr);
      }
      .details-primary .dl:nth-child(2),
      .details-secondary .dl:nth-child(2) { border-right: none; }
      .details-primary .dl:nth-child(3),
      .details-secondary .dl:nth-child(3) { border-right: 1px solid rgba(255,255,255,.1); }
    }

    /* ── desktop (≥ 720px) ─── */
    @media (min-width: 720px) {
      #app {
        max-width: 1000px;
        padding: 2.25rem 2.5rem 2.5rem;
      }

      .hdr { margin-bottom: 1.75rem; }
      .loc { font-size: 1.05rem; gap: .55rem; }
      .dot { width: 6px; height: 6px; }

      .top-grid {
        flex-direction: row;
        gap: 2rem;
        align-items: flex-start;
        margin-bottom: 1.75rem;
      }

      .hero {
        flex: 0 0 auto;
        align-items: flex-start;
        text-align: left;
        padding: .5rem 0 0;
        min-width: 220px;
      }
      .wx-icon { font-size: 5.5rem; margin-bottom: .35rem; }
      .temp    { font-size: 8rem; }
      .temp sup { font-size: 2.75rem; }
      .cond    { font-size: 1.1rem; margin: .4rem 0 .3rem; }
      .range   { font-size: .88rem; }

      .right-col {
        flex: 1;
        gap: .65rem;
        justify-content: center;
      }

      .dl-label { font-size: .62rem; margin-bottom: .22rem; }
      .dl-val   { font-size: 1rem; }
      .details-secondary .dl-val { font-size: .92rem; }
      .details-primary  { padding: 1rem .5rem; }
      .details-secondary { padding: .85rem .5rem; }

      .astro-row { font-size: .88rem; padding: .6rem .75rem; }
      .aqi-pill  { font-size: .75rem; padding: .22rem .8rem; }

      .hourly-wrap { margin-bottom: 1.5rem; }
      .hour {
        width: 62px; padding: .65rem .15rem;
        border-radius: .8rem;
      }
      .hour-time { font-size: .62rem; }
      .hour-icon { font-size: 1.35rem; margin-bottom: .28rem; }
      .hour-temp { font-size: .84rem; }
      .hour-rain { font-size: .68rem; }

      .fc { gap: .45rem; margin-bottom: 1.25rem; }
      .day { padding: .75rem .2rem; border-radius: .8rem; }
      .day-name  { font-size: .62rem; margin-bottom: .3rem; }
      .day-icon  { font-size: 1.6rem; margin-bottom: .3rem; }
      .day-temps { font-size: .78rem; }
      .day-pop   { font-size: .67rem; margin-top: .18rem; }

      .sec-label { font-size: .62rem; margin-bottom: .55rem; }

      #day-detail { padding: 1.25rem 1.25rem 1rem; }
      .dd-grid { grid-template-columns: repeat(6, 1fr); gap: .5rem .3rem; }
      .dd-icon  { font-size: 2.75rem; }
      .dd-title { font-size: 1.1rem; }
      .dd-temp  { font-size: 1.8rem; }
      .dd-cell-lbl { font-size: .58rem; }
      .dd-cell-val { font-size: .9rem; }

      #search {
        inset: auto;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 500px; max-width: calc(100vw - 3rem);
        max-height: min(580px, 80vh);
        border-radius: 1.25rem;
        border: 1px solid rgba(255,255,255,.12);
        padding: 1.75rem;
      }

      /* skeleton desktop: side-by-side top */
      .sk-hero-sec { align-items: flex-start; }
      .sk-lbl  { width: 18%; }
    }

    /* ── large desktop (≥ 1100px) ─── */
    @media (min-width: 1100px) {
      #app { max-width: 1200px; padding: 2.5rem 3.5rem 3rem; }
      .top-grid { gap: 3rem; }
      .hero { min-width: 260px; }
      .temp { font-size: 9rem; }
      .wx-icon { font-size: 6.5rem; }
    }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body class="sky-clear">
<div id="app">

  <div id="loading" aria-label="Carregando previsão do tempo">
    <div class="sk-layout" aria-hidden="true">
      <div class="sk-hdr-row">
        <div class="sk sk-loc"></div>
        <div class="sk sk-btn"></div>
      </div>
      <div class="sk-hero-sec">
        <div class="sk sk-wx-icon"></div>
        <div class="sk sk-temp"></div>
        <div class="sk sk-cond"></div>
        <div class="sk sk-range"></div>
      </div>
      <div class="sk sk-card sk-primary"></div>
      <div class="sk sk-card sk-secondary"></div>
      <div class="sk sk-card sk-astro"></div>
      <div class="sk sk-lbl"></div>
      <div class="sk-hr-row">

<script>
  const FALLBACK = { lat: -18.9186, lon: -48.2772 };
  let _lastLat = FALLBACK.lat, _lastLon = FALLBACK.lon;

  const EMOJI = {
    0:'☀️',1:'🌤️',2:'⛅',3:'☁️',
    45:'🌫️',48:'🌫️',
    51:'🌦️',53:'🌦️',55:'🌧️',
    61:'🌧️',63:'🌧️',65:'🌧️',
    71:'❄️',73:'❄️',75:'❄️',77:'🌨️',
    80:'🌦️',81:'🌦️',82:'🌧️',
    85:'🌨️',86:'❄️',
    95:'⛈️',96:'⛈️',99:'⛈️',
  };

  const WMO_PT = {
    0:'Céu limpo',1:'Predominantemente limpo',2:'Parcialmente nublado',3:'Nublado',
    45:'Nevoeiro',48:'Nevoeiro com geada',
    51:'Garoa leve',53:'Garoa',55:'Garoa intensa',
    61:'Chuva leve',63:'Chuva moderada',65:'Chuva forte',
    71:'Neve leve',73:'Neve',75:'Neve forte',77:'Granizo',
    80:'Pancadas leves',81:'Pancadas de chuva',82:'Pancadas fortes',
    95:'Trovoada',96:'Trovoada com granizo',99:'Trovoada severa',
  };

  const DAYS_PT = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

  const THEME_COLORS = {
    'sky-clear':'#0c4a6e', 'sky-pcloudy':'#1e4976', 'sky-cloudy':'#1e293b',
    'sky-fog':'#2d3748', 'sky-rain':'#0f2744', 'sky-storm':'#0a0f1e',
    'sky-snow':'#cbd5e1', 'sky-night':'#020617',
  };

  function wxEmoji(code, isDay = true) {
    if (code === 0 && !isDay) return '🌙';
    return EMOJI[code] ?? (code <= 3 ? '⛅' : code <= 48 ? '🌫️' : code <= 67 ? '🌧️' : code <= 77 ? '❄️' : '⛈️');
  }

  function skyClass(code, isDay = true) {
    if (!isDay) return 'sky-night';
    if (code >= 95) return 'sky-storm';
    if ([55,61,63,65,80,81,82].includes(code)) return 'sky-rain';
    if ([45,48].includes(code)) return 'sky-fog';
    if (code >= 71 && code <= 77) return 'sky-snow';
    if (code === 3) return 'sky-cloudy';
    if (code === 2) return 'sky-pcloudy';
    return 'sky-clear';
  }

  function aqiClass(label) {
    if (!label) return '';
    if (['Ótima','Boa'].includes(label)) return 'aqi-good';
    if (label === 'Moderada') return 'aqi-mod';
    return 'aqi-bad';
  }

  function uvLabel(v) {
    if (v == null) return '';
    if (v >= 11) return 'Extremo';
    if (v >= 8)  return 'Muito alto';
    if (v >= 6)  return 'Alto';
    if (v >= 3)  return 'Moderado';
    return 'Baixo';
  }

  function dayLabel(isoDate, idx) {
    if (idx === 0) return 'Hoje';
    if (idx === 1) return 'Amanhã';
    try { return DAYS_PT[new Date(isoDate + 'T12:00:00').getDay()]; }
    catch (_) { return DAYS_PT[idx % 7]; }
  }

  function getAqiLabel(v) {
    if (v == null) return null;
    const tiers = [[0,'Ótima'],[20,'Boa'],[40,'Moderada'],[60,'Ruim'],[80,'Muito Ruim'],[100,'Extremamente Ruim']];
    return [...tiers].reverse().find(([t]) => v >= t)?.[1] ?? 'Ótima';
  }

  function bearingDir(deg) {
    if (deg == null) return '';
    return ['N','NE','L','SE','S','SO','O','NO'][Math.round(deg / 45) % 8];
  }

  function updateThemeColor(cls) {
    const meta = document.getElementById('theme-color');
    if (meta) meta.content = THEME_COLORS[cls] || '#0c4a6e';
  }

  function $id(id) { return document.getElementById(id); }
  function show(id) { $id(id).hidden = false; }
  function hide(id) { $id(id).hidden = true; }

  let allData = null;
  let selectedDayIdx = -1;

  function renderDayDetail(idx) {
    const days = (allData || {}).daily || [];
    if (idx === selectedDayIdx || !days[idx]) {
      selectedDayIdx = -1;
      hide('day-detail');
      document.querySelectorAll('.day').forEach(el => el.classList.remove('selected'));
      return;
    }
    selectedDayIdx = idx;
    document.querySelectorAll('.day').forEach((el, i) => {
      el.classList.toggle('selected', i === idx);
      el.setAttribute('aria-pressed', String(i === idx));
    });

    const d = days[idx];
    const uv = d.uv_max != null ? `${d.uv_max} · ${uvLabel(d.uv_max)}` : '–';
    const cells = [
      ['Chance chuva', d.precip_prob != null ? `${d.precip_prob}%` : '–'],
      ['Precipitação', d.precip_mm != null ? `${d.precip_mm} mm` : '–'],
      ['Índice UV',    uv],
      ['Vento máx.',  d.wind_max_kph != null ? `${d.wind_max_kph} km/h` : '–'],
      ['Nascer sol',  d.sunrise || '–'],
      ['Pôr do sol',  d.sunset  || '–'],
    ];

    $id('day-detail').innerHTML = `
      <div class="dd-hdr">
        <div class="dd-icon" aria-hidden="true">${wxEmoji(d.code || 0)}</div>
        <div class="dd-meta">
          <div class="dd-title">${d.day}</div>
          <div class="dd-cond">${d.condition}</div>
        </div>
        <div class="dd-temp">
          ${d.max != null ? d.max : '–'}°
          <span class="dd-temp-min"> / ${d.min != null ? d.min : '–'}°</span>
        </div>
      </div>
      <div class="dd-grid">
        ${cells.map(([lbl, val]) => `
          <div class="dd-cell">
            <div class="dd-cell-lbl">${lbl}</div>
            <div class="dd-cell-val">${val}</div>
          </div>`).join('')}
      </div>`;

    show('day-detail');
    if (window.innerWidth < 720) {
      $id('day-detail').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }

  // ── render ──────────────────────────────────────
  function render(data) {
    allData = data;
    selectedDayIdx = -1;
    hide('day-detail');
    window.scrollTo({ top: 0, behavior: 'instant' });

    const c = data.current || {};
    const t = data.today || {};
    const daily  = data.daily  || [];
    const hourly = data.hourly || [];

    const cls = skyClass(c.code || 0, c.is_day !== false);
    document.body.className = cls;
    updateThemeColor(cls);

    $id('city').textContent  = data.city || '–';
    $id('icon').textContent  = wxEmoji(c.code || 0, c.is_day !== false);
    $id('icon').setAttribute('aria-label', c.condition || '');
    $id('temp').innerHTML    = `${c.temp != null ? c.temp : '–'}<sup aria-hidden="true">°</sup>`;
    $id('temp').setAttribute('aria-label', c.temp != null ? `${c.temp} graus` : 'Temperatura indisponível');
    $id('cond').textContent  = c.condition || '';
    if (daily[0]?.max != null && daily[0]?.min != null)
      $id('range').textContent = `Máx ${daily[0].max}°  ·  Mín ${daily[0].min}°`;

    // primary details
    $id('d-feels').textContent = c.feels_like != null ? `${c.feels_like}°` : (c.temp != null ? `${c.temp}°` : '–');
    $id('d-hum').textContent   = c.humidity   != null ? `${c.humidity}%`   : '–';
    $id('d-wind').textContent  = c.wind_kph   != null
      ? `${c.wind_kph}${c.wind_dir ? ' ' + c.wind_dir : ''} km/h` : '–';
    $id('d-rain').textContent  = c.precip_now_mm > 0
      ? `${c.precip_now_mm} mm/h`
      : daily[0]?.precip_prob != null ? `${daily[0].precip_prob}%` : '–';

    // secondary details
    $id('d-uv').textContent   = c.uv_index      != null ? `${c.uv_index} · ${uvLabel(c.uv_index)}` : '–';
    $id('d-vis').textContent  = c.visibility_km != null ? `${c.visibility_km} km`   : '–';
    $id('d-pres').textContent = c.pressure_mb   != null ? `${c.pressure_mb} hPa`    : '–';
    $id('d-dew').textContent  = c.dew_point     != null ? `${c.dew_point}°`         : '–';

    // sunrise / sunset
    $id('astro-sunrise').innerHTML = t.sunrise ? `<span aria-hidden="true">☀️</span><span>${t.sunrise}</span>` : '';
    $id('astro-sunset').innerHTML  = t.sunset  ? `<span>${t.sunset}</span><span aria-hidden="true">🌇</span>` : '';

    // AQI pill
    const aqEl = $id('aqi-pill');
    aqEl.innerHTML = t.aqi_label
      ? `<span class="aqi-pill ${aqiClass(t.aqi_label)}">Ar: ${t.aqi_label}</span>`
      : '';

    // hourly strip
    const hourlyEl = $id('hourly');
    hourlyEl.innerHTML = '';
    hourly.forEach((h, i) => {
      const el = document.createElement('div');
      el.className = 'hour' + (i === 0 ? ' now' : '');
      el.setAttribute('aria-label', `${h.time}: ${WMO_PT[h.code] || ''}, ${h.temp != null ? h.temp + '°' : ''}`);
      el.innerHTML = `
        <div class="hour-time">${h.time}</div>
        <div class="hour-icon" aria-hidden="true">${wxEmoji(h.code || 0)}</div>
        <div class="hour-temp">${h.temp != null ? h.temp + '°' : '–'}</div>
        <div class="hour-rain">${h.precip_prob >= 20 ? h.precip_prob + '%' : ''}</div>`;
      hourlyEl.appendChild(el);
    });

    // 7-day forecast
    const fcEl = $id('fc');
    fcEl.innerHTML = '';
    daily.forEach((d, i) => {
      const el = document.createElement('div');
      el.className = 'day' + (i === 0 ? ' today' : '');
      el.setAttribute('role', 'button');
      el.setAttribute('tabindex', '0');
      el.setAttribute('aria-pressed', 'false');
      el.setAttribute('aria-label',
        `${d.day}: ${d.condition}${d.max != null ? ', máx ' + d.max + '°' : ''}${d.min != null ? ', mín ' + d.min + '°' : ''}${d.precip_prob > 0 ? ', chuva ' + d.precip_prob + '%' : ''}`);
      el.innerHTML = `
        <div class="day-name">${d.day || '–'}</div>
        <div class="day-icon" aria-hidden="true">${wxEmoji(d.code || 0)}</div>
        <div class="day-temps">
          <span class="day-max">${d.max != null ? d.max : '–'}°</span>
          <span class="day-min">/${d.min != null ? d.min : '–'}°</span>
        </div>
        <div class="day-pop">${d.precip_prob > 0 ? d.precip_prob + '%' : ''}</div>`;
      el.onclick = () => renderDayDetail(i);
      el.addEventListener('keydown', ev => {
        if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); renderDayDetail(i); }
      });
      fcEl.appendChild(el);
    });

    // reliability badge
    const relEl = $id('rel-pill');
    const relMap = {
      alta:    ['rel-alta',   'Alta confiabilidade'],
      boa:     ['rel-boa',    'Boa confiabilidade'],
      'padrão':['rel-padrao', 'Confiabilidade padrão'],
    };
    const relInfo = relMap[data.reliability] || relMap['padrão'];
    relEl.className = `rel-pill ${relInfo[0]}`;
    relEl.textContent = relInfo[1];
    relEl.hidden = false;

    // source
    const srcMap = {
      'owm+cptec+open-meteo':        '· OWM + CPTEC + Open-Meteo',
      'owm+open-meteo':              '· OWM + Open-Meteo',
      'tomorrowio+cptec+open-meteo': '· Tomorrow.io + CPTEC + Open-Meteo',
      'tomorrowio+open-meteo':       '· Tomorrow.io + Open-Meteo',
      'cptec+open-meteo':            '· CPTEC/INPE + Open-Meteo',
      'open-meteo':                  '· Open-Meteo',
    };
    $id('src').textContent = srcMap[data.source] || `· ${data.source || ''}`;

    // thunder probability pill (Tomorrow.io only)
    const tEl = $id('thunder-pill');
    const tp = data.current?.thunder_prob;
    if (tp != null && tp >= 20) {
      tEl.textContent = `Trovoada ${tp}%`;
      tEl.hidden = false;
    } else {
      tEl.hidden = true;
    }

    hide('loading'); hide('err'); show('wx');
  }

  // ── browser fallback (Open-Meteo direto) ─────────
  async function fetchOpenMeteo(lat, lon) {
    const qs = new URLSearchParams({
      latitude: lat.toFixed(4), longitude: lon.toFixed(4),
      hourly: 'temperature_2m,relativehumidity_2m,apparent_temperature,precipitation_probability,weathercode,surface_pressure,visibility,uv_index,dewpoint_2m,windspeed_10m,winddirection_10m,windgusts_10m',
      daily: 'weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,uv_index_max,windspeed_10m_max,sunrise,sunset',
      current: 'weather_code,precipitation,temperature_2m,relative_humidity_2m,apparent_temperature,wind_speed_10m,wind_direction_10m,wind_gusts_10m,surface_pressure,visibility,uv_index,is_day',
      timezone: 'America/Sao_Paulo',
      forecast_days: '7',
    });
    const qs2 = new URLSearchParams({
      latitude: lat.toFixed(4), longitude: lon.toFixed(4),
      hourly: 'pm2_5,european_aqi',
      timezone: 'America/Sao_Paulo',
      forecast_days: '1',
    });

    const [wxRes, cityRes, aqRes] = await Promise.all([
      fetch(`https://api.open-meteo.com/v1/forecast?${qs}`),
      fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=pt`),
      fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?${qs2}`).catch(() => null),
    ]);

    const wx   = await wxRes.json();
    const cd   = await cityRes.json();
    const aq   = aqRes ? await aqRes.json().catch(() => null) : null;

    const city    = cd.city || cd.locality || '';
    const stCode  = (cd.principalSubdivisionCode || '').replace(/^BR-/, '');
    const cityName = city && stCode ? `${city}, ${stCode}` : city || 'Uberlândia, MG';

    const cw     = wx.current || {};
    const daily  = wx.daily  || {};
    const hourly = wx.hourly || {};
    const rawCode = cw.weather_code ?? 0;
    // Override with precipitation field when model code doesn't indicate rain
    function precipToWmo(mm) {
      if (mm == null || mm < 0.1) return null;
      if (mm >= 25) return 65;
      if (mm >= 5)  return 63;
      if (mm >= 0.5) return 61;
      return 51;
    }
    const rainCode = precipToWmo(cw.precipitation);
    const code = (rainCode && rawCode < 51) ? rainCode : rawCode;

    const cwTime = (cw.time || '').slice(0, 13);
    const hTimes = hourly.time || [];
    let hi = hTimes.findIndex(t => t.slice(0, 13) >= cwTime);
    if (hi < 0) hi = 0;
    const h = key => (hourly[key] || [])[hi] ?? null;

    // AQ
    let aqiVal = null, pm25 = null, aqiLabel = null;
    if (aq) {
      const aqH = aq.hourly || {};
      const aqT = aqH.time || [];
      let aqHi = aqT.findIndex(t => t.slice(0, 13) >= cwTime);
      if (aqHi < 0) aqHi = 0;
      aqiVal = (aqH.european_aqi || [])[aqHi] ?? null;
      pm25   = (aqH.pm2_5 || [])[aqHi] ?? null;
      if (aqiVal != null) aqiLabel = getAqiLabel(Math.round(aqiVal));
    }

    const sunrise = (daily.sunrise || [])[0]?.slice(11, 16) ?? null;
    const sunset  = (daily.sunset  || [])[0]?.slice(11, 16) ?? null;
    const uvMax   = (daily.uv_index_max || [])[0] != null ? Math.round((daily.uv_index_max)[0] * 10) / 10 : null;

    const hCode = hourly.weathercode || [];
    const hTemp = hourly.temperature_2m || [];
    const hPop  = hourly.precipitation_probability || [];
    const hourlyOut = [];
    for (let j = hi; j < Math.min(hi + 24, hTimes.length); j++) {
      hourlyOut.push({
        time: hTimes[j].slice(11, 16),
        code: hCode[j] ?? 0,
        temp: hTemp[j] != null ? Math.round(hTemp[j]) : null,
        precip_prob: hPop[j] ?? 0,
      });
    }

    const dTimes   = daily.time || [];
    const dCode    = daily.weathercode || [];
    const dMax     = daily.temperature_2m_max || [];
    const dMin     = daily.temperature_2m_min || [];
    const dPrecip  = daily.precipitation_sum || [];
    const dPop     = daily.precipitation_probability_max || [];
    const dUv      = daily.uv_index_max || [];
    const dWind    = daily.windspeed_10m_max || [];
    const dSunrise = daily.sunrise || [];
    const dSunset  = daily.sunset  || [];

    const dailyOut = dTimes.slice(0, 7).map((dt, i) => ({
      day: dayLabel(dt, i),
      code: dCode[i] ?? 0,
      condition: WMO_PT[dCode[i]] || '',
      max: dMax[i] != null ? Math.round(dMax[i]) : null,
      min: dMin[i] != null ? Math.round(dMin[i]) : null,
      precip_mm: dPrecip[i] ?? 0,
      precip_prob: dPop[i] ?? 0,
      uv_max: dUv[i] != null ? Math.round(dUv[i] * 10) / 10 : null,
      wind_max_kph: dWind[i] != null ? Math.round(dWind[i]) : null,
      sunrise: dSunrise[i] ? dSunrise[i].slice(11, 16) : null,
      sunset:  dSunset[i]  ? dSunset[i].slice(11, 16)  : null,
    }));

    const visM = cw.visibility ?? h('visibility');
    return {
      city: cityName,
      source: 'open-meteo',
      reliability: 'padrão',
      current: {
        temp:          cw.temperature_2m != null ? Math.round(cw.temperature_2m) : null,
        feels_like:    cw.apparent_temperature != null ? Math.round(cw.apparent_temperature) : null,
        humidity:      cw.relative_humidity_2m ?? null,
        wind_kph:      cw.wind_speed_10m != null ? Math.round(cw.wind_speed_10m) : null,
        wind_dir:      bearingDir(cw.wind_direction_10m),
        wind_gust_kph: cw.wind_gusts_10m != null ? Math.round(cw.wind_gusts_10m) : null,
        condition:     WMO_PT[code] || '',
        code,
        visibility_km: visM != null ? Math.round(visM / 100) / 10 : null,
        pressure_mb:   cw.surface_pressure != null ? Math.round(cw.surface_pressure) : null,
        dew_point:     h('dewpoint_2m') != null ? Math.round(h('dewpoint_2m')) : null,
        uv_index:      cw.uv_index != null ? Math.round(cw.uv_index * 10) / 10 : null,
        is_day:        !!cw.is_day,
      },
      today:  { sunrise, sunset, uv_max: uvMax, aqi: aqiVal != null ? Math.round(aqiVal) : null, aqi_label: aqiLabel, pm25 },
      hourly: hourlyOut,
      daily:  dailyOut,
    };
  }

  // ── load ────────────────────────────────────────
  async function load(lat, lon) {
    _lastLat = lat; _lastLon = lon;
    show('loading'); hide('wx'); hide('err');
    let data = null;

    try {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 9000);
      const r = await fetch(`/api/weather?lat=${lat}&lon=${lon}`, { signal: ctrl.signal });
      clearTimeout(tid);
      if (r.ok) { const j = await r.json(); if (!j.error) data = j; }
    } catch (_) {}

    if (!data) {
      try { data = await fetchOpenMeteo(lat, lon); }
      catch (_) {}
    }

    if (!data) {
      $id('err-msg').textContent = 'Não foi possível obter o clima. Verifique sua conexão.';
      hide('loading'); show('err');
      return;
    }
    render(data);
    initRadarMap(_lastLat, _lastLon, data.key_status?.owm ?? false);
  }

  function init() {
    if (!navigator.geolocation) { load(FALLBACK.lat, FALLBACK.lon); return; }
    show('loading');
    navigator.geolocation.getCurrentPosition(
      p => load(p.coords.latitude, p.coords.longitude),
      () => load(FALLBACK.lat, FALLBACK.lon),
      { timeout: 8000, maximumAge: 300000 }
    );
  }

  // ── search ──────────────────────────────────────
  function openSearch() {
    show('search');
    $id('sinput').focus();
    document.addEventListener('keydown', trapFocus);
  }

  function closeSearch() {
    hide('search');
    $id('sinput').value = '';
    $id('sresults').innerHTML = '';
    document.removeEventListener('keydown', trapFocus);
  }

  function trapFocus(e) {
    if (e.key === 'Escape') { closeSearch(); return; }
    if (e.key !== 'Tab') return;
    const focusable = [...$id('search').querySelectorAll('button, input, [tabindex]:not([tabindex="-1"])')];
    if (!focusable.length) return;
    const first = focusable[0], last = focusable[focusable.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  }

  // close search on click outside (desktop modal)
  document.addEventListener('mousedown', e => {
    if (!$id('search').hidden && !$id('search').contains(e.target)) closeSearch();
  });

  let searchTimer;
  $id('sinput').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => doSearch(e.target.value.trim()), 280);
  });

  async function doSearch(q) {
    const ul = $id('sresults');
    if (!q || q.length < 2) { ul.innerHTML = ''; return; }
    try {
      const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&language=pt&count=8`);
      paintResults((await r.json()).results || []);
    } catch (_) {
      ul.innerHTML = '<li class="sr-empty">Erro na busca.</li>';
    }
  }

  function paintResults(results) {
    const ul = $id('sresults');
    if (!results.length) { ul.innerHTML = '<li class="sr-empty">Nenhuma cidade encontrada</li>'; return; }
    ul.innerHTML = '';
    results.forEach(r => {
      const li = document.createElement('li');
      li.className = 'sr';
      li.setAttribute('role', 'option');
      li.setAttribute('tabindex', '0');
      const region = [r.admin1, r.country].filter(Boolean).join(', ');
      li.innerHTML = `<span class="sr-city">${r.name}</span><span class="sr-region">${region}</span>`;
      const select = () => { closeSearch(); load(r.latitude, r.longitude); };
      li.onclick = select;
      li.addEventListener('keydown', ev => { if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); select(); } });
      ul.appendChild(li);
    });
  }

  init();
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  let _map = null, _owmLayer = null, _marker = null, _activeMapLayer = 'precipitation_new';

  function initRadarMap(lat, lon, hasOwm) {
    if (!hasOwm) return;
    show('radar-section');
    if (_map) {
      _map.setView([lat, lon], 9);
      if (_marker) _marker.setLatLng([lat, lon]);
    } else {
      _map = L.map('radar-map', { zoomControl: true, attributionControl: false })
               .setView([lat, lon], 9);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18 })
       .addTo(_map);
      _marker = L.marker([lat, lon]).addTo(_map);
    }
    _setOwmLayer(_activeMapLayer);
    document.querySelectorAll('.layer-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        _activeMapLayer = btn.dataset.layer;
        _setOwmLayer(_activeMapLayer);
      };
    });
  }

  function _setOwmLayer(layer) {
    if (_owmLayer) _map.removeLayer(_owmLayer);
    _owmLayer = L.tileLayer(
      `/api/tile?layer=${layer}&z={z}&x={x}&y={y}`,
      { opacity: 0.6, maxZoom: 18 }
    ).addTo(_map);
  }
</script>
